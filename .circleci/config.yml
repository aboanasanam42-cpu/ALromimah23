version: 2.1

orbs:
  android: circleci/android@2.4.0

jobs:
  build:
    executor:
      name: android/android-machine
      resource-class: large
      tag: 2024.01.1
    steps:
      - checkout
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
            - gradle-v1-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-
            - gradle-v1-
      - run:
          name: Build Debug APK
          command: ./gradlew assembleDebug --build-cache --parallel
      - save_cache:
          key: gradle-v1-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
      - store_artifacts:
          path: app/build/outputs/apk/debug/app-debug.apk
          destination: app-debug.apk

workflows:
  build-workflow:
    jobs:
      - build
      