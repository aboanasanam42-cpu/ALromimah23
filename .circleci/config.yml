version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2025.04.1
    steps:
      - checkout

      - run:
          name: Decode Keystore
          command: echo $CM_KEYSTORE_BASE64 | base64 --decode > app/upload-keystore.jks

      - run:
          name: Build Release APK
          command: ./gradlew assembleRelease

      # تم إدراج أمر حفظ التطبيق الناتج هنا لتتمكن من تحميله مباشرة من منصة CircleCI
      - store_artifacts:
          path: app/build/outputs/apk/release/
          destination: release-apk

      - run:
          name: Fallback Hook
          command: |
            echo "Build failed, triggering fallback hook..."
          when: on_fail

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main  # تفعيل البناء التلقائي عند التحديث على الفرع الرئيسي
