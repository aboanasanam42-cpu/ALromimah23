version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2025.04.1
    resource_class: large
    environment:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
        -Dkotlin.incremental=false
      TERM: dumb
    steps:
      - checkout

      - run:
          name: Decode Keystore
          command: printf '%s' "$CM_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > app/upload-keystore.jks

      - run:
          name: Decode Google Services JSON
          command: |
            python3 - << 'PYEOF'
            import base64, os
            raw = ''.join(os.environ['GOOGLE_SERVICES_JSON_BASE64'].split())
            try:
                data = base64.b64decode(raw + '=' * (-len(raw) % 4))
            except Exception:
                data = base64.urlsafe_b64decode(raw + '=' * (-len(raw) % 4))
            open('app/google-services.json', 'wb').write(data)
            PYEOF

      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
            - gradle-v2-{{ checksum "build.gradle.kts" }}
            - gradle-v2-

      - run:
          name: Setup Gradle Wrapper
          command: |
            if [ ! -f gradlew ]; then
              wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -P /tmp/
              unzip -q /tmp/gradle-8.6-bin.zip -d /tmp/gradle/
              /tmp/gradle/gradle-8.6/bin/gradle wrapper --gradle-version=8.6
              rm -rf /tmp/gradle /tmp/gradle-8.6-bin.zip
            fi
            chmod +x gradlew

      - run:
          name: Download Dependencies
          command: ./gradlew dependencies --no-build-cache -q || true

      - run:
          name: Build Release APK and AAB
          command: ./gradlew assembleRelease bundleRelease --build-cache --stacktrace

      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-v2-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}

      - store_artifacts:
          path: app/build/outputs/apk/release/
          destination: release-apk

      - store_artifacts:
          path: app/build/outputs/bundle/release/
          destination: release-aab

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
