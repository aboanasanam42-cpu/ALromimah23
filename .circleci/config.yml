version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2025.04.1
    steps:
      - checkout

      - run:
          name: Decode Keystore
          command: printf '%s' "$CM_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > app/upload-keystore.jks

      - run:
          name: Decode Google Services JSON
          command: printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '[:space:]' | base64 --decode > app/google-services.json

      - run:
          name: Setup Gradle Wrapper
          command: |
            wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -P /tmp/
            unzip -q /tmp/gradle-8.6-bin.zip -d /tmp/gradle/
            /tmp/gradle/gradle-8.6/bin/gradle wrapper --gradle-version=8.6
            chmod +x gradlew

      - run:
          name: Build Release APK
          command: ./gradlew assembleRelease

      # تم إدراج أمر حفظ التطبيق الناتج هنا لتتمكن من تحميله مباشرة من منصة CircleCI
      - store_artifacts:
          path: app/build/outputs/apk/release/
          destination: release-apk

      - run:
          name: Fallback Hook
          command: |
            echo "Build failed, triggering fallback hook..."
          when: on_fail

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main  # تفعيل البناء التلقائي عند التحديث على الفرع الرئيسي
