version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2025.04.1
    resource_class: large
    environment:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx6g -XX:MaxMetaspaceSize=1024m -Dkotlin.incremental=true"
      TERM: dumb
    steps:
      - checkout

      - run:
          name: Decode Keystore
          command: printf '%s' "$CM_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > app/upload-keystore.jks

      - run:
          name: Decode Google Services JSON
          command: |
            python3 - \<< 'PYEOF'
            import base64, os, json, sys

            def padded(s):
                return s + '=' * (-len(s) % 4)

            def valid_json(b):
                try:
                    json.loads(b)
                    return True
                except Exception:
                    return False

            raw = ''.join(os.environ['GOOGLE_SERVICES_JSON_BASE64'].split())

            candidates = []
            for decode_fn in (base64.b64decode, base64.urlsafe_b64decode):
                try:
                    candidates.append(decode_fn(padded(raw)))
                except Exception:
                    pass

            # Handle double-encoded case (base64 of base64)
            for first_pass in list(candidates):
                try:
                    inner = ''.join(first_pass.decode('ascii', errors='ignore').split())
                    for decode_fn in (base64.b64decode, base64.urlsafe_b64decode):
                        try:
                            candidates.append(decode_fn(padded(inner)))
                        except Exception:
                            pass
                except Exception:
                    pass

            for data in candidates:
                if valid_json(data):
                    open('app/google-services.json', 'wb').write(data)
                    print("google-services.json decoded successfully")
                    sys.exit(0)

            print("ERROR: no decoding strategy produced valid JSON", file=sys.stderr)
            sys.exit(1)
            PYEOF

      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
            - gradle-v2-{{ checksum "build.gradle.kts" }}
            - gradle-v2-

      - run:
          name: Setup Gradle Wrapper
          command: |
            if [ ! -f gradlew ]; then
              wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -P /tmp/
              unzip -q /tmp/gradle-8.6-bin.zip -d /tmp/gradle/
              /tmp/gradle/gradle-8.6/bin/gradle wrapper --gradle-version=8.6
              rm -rf /tmp/gradle /tmp/gradle-8.6-bin.zip
            fi
            chmod +x gradlew

      - run:
          name: Build Release APK and AAB
          no_output_timeout: 30m
          command: ./gradlew assembleRelease bundleRelease --build-cache --parallel --stacktrace

      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-v2-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}

      - store_artifacts:
          path: app/build/outputs/apk/release/
          destination: release-apk

      - store_artifacts:
          path: app/build/outputs/bundle/release/
          destination: release-aab

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
